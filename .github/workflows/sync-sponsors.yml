name: Sync Sponsors

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Update README sponsor acknowledgments
        env:
          GH_SPONSORS_LOGIN: fahdabidi
          GH_SPONSORS_TOKEN: ${{ secrets.SPONSORS_READ_TOKEN }}
        run: python tools/update_sponsors_readme.py

      - name: Commit updated README
        run: |
          if git diff --quiet -- README.md; then
            echo "No README sponsor changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs(readme): sync sponsor acknowledgments"
          git push
