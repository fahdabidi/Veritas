services:
  publisher:
    image: busybox:1.36
    command: ["sh", "-c", "echo 'publisher smoke placeholder'; sleep 600"]
    profiles: ["manual"]

  exit-bridge-a:
    image: busybox:1.36
    command: ["sh", "-c", "echo 'exit bridge a smoke placeholder'; sleep 600"]
    depends_on:
      - publisher
    profiles: ["manual"]

  exit-bridge-b:
    image: busybox:1.36
    command: ["sh", "-c", "echo 'exit bridge b smoke placeholder'; sleep 600"]
    depends_on:
      - publisher
    profiles: ["manual"]

  host-creator:
    image: busybox:1.36
    command: ["sh", "-c", "echo 'host creator smoke placeholder'; sleep 600"]
    depends_on:
      - exit-bridge-a
    profiles: ["manual"]

  creator:
    image: busybox:1.36
    command: ["sh", "-c", "echo 'creator smoke placeholder'; sleep 600"]
    depends_on:
      - host-creator
      - exit-bridge-b
    profiles: ["manual"]
