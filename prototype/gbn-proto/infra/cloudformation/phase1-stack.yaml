AWSTemplateFormatVersion: '2010-09-09'
Description: >
  GBN Phase 1 Prototype - Media Creation Network
  Deploys Creator, Relay, and Publisher EC2 Spot instances across 3 AZs
  for testing the anonymized video chunking and reassembly pipeline.

Parameters:
  AmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-6.1-x86_64
    Description: Amazon Linux 2023 latest AMI (auto-resolved via SSM)

  CreatorInstanceType:
    Type: String
    Default: t3.small
    AllowedValues: [t3.micro, t3.small, t3.medium]
    Description: Instance type for Creator node (needs CPU for encryption)

  RelayInstanceType:
    Type: String
    Default: t3.micro
    AllowedValues: [t3.micro, t3.small]
    Description: Instance type for Relay nodes (lightweight forwarding)

  PublisherInstanceType:
    Type: String
    Default: t3.small
    AllowedValues: [t3.micro, t3.small, t3.medium]
    Description: Instance type for Publisher node (needs CPU for decryption + reassembly)

  ArtifactBucketName:
    Type: String
    Default: ''
    Description: Optional override for artifact bucket name

Conditions:
  HasCustomArtifactBucketName: !Not [!Equals [!Ref ArtifactBucketName, '']]

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: gbn-proto-phase1-vpc

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: gbn-proto-phase1-igw

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: gbn-proto-phase1-rt

  DefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: gbn-proto-subnet-a

  SubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: gbn-proto-subnet-b

  SubnetC:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.3.0/24
      AvailabilityZone: !Select [2, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: gbn-proto-subnet-c

  SubnetARouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref SubnetA
      RouteTableId: !Ref RouteTable

  SubnetBRouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref SubnetB
      RouteTableId: !Ref RouteTable

  SubnetCRouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref SubnetC
      RouteTableId: !Ref RouteTable

  RelaySecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow inter-relay traffic on ports 9000-9100 within VPC
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 9000
          ToPort: 9100
          CidrIp: 10.0.0.0/16
      Tags:
        - Key: Name
          Value: gbn-proto-relay-sg

  CloudMapNamespace:
    Type: AWS::ServiceDiscovery::PrivateDnsNamespace
    Properties:
      Name: gbn.local
      Description: Private DNS namespace for GBN relay peer discovery
      Vpc: !Ref VPC

  RelayDiscoveryService:
    Type: AWS::ServiceDiscovery::Service
    Properties:
      Name: relay
      Description: Cloud Map service for relay task discovery
      NamespaceId: !Ref CloudMapNamespace
      DnsConfig:
        RoutingPolicy: MULTIVALUE
        DnsRecords:
          - Type: A
            TTL: 30
      HealthCheckCustomConfig:
        FailureThreshold: 1

  Phase1InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: ArtifactReadPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource: !Sub '${ArtifactBucket.Arn}/*'

  Phase1InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref Phase1InstanceRole

  ArtifactBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !If
        - HasCustomArtifactBucketName
        - !Ref ArtifactBucketName
        - !Sub gbn-proto-phase1-artifacts-${AWS::AccountId}-${AWS::Region}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  CreatorInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref CreatorInstanceType
      ImageId: !Ref AmiId
      IamInstanceProfile: !Ref Phase1InstanceProfile
      SubnetId: !Ref SubnetA
      SecurityGroupIds:
        - !Ref RelaySecurityGroup
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euxo pipefail
          hostnamectl set-hostname gbn-creator
          dnf install -y gcc make openssl-devel perl-FindBin perl-IPC-Cmd
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source /root/.cargo/env
          dnf install -y ffmpeg || {
            curl -L -o /tmp/ffmpeg.tar.xz https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz
            tar -xf /tmp/ffmpeg.tar.xz -C /usr/local/bin --strip-components=1 --wildcards '*/ffmpeg' '*/ffprobe'
          }
          echo "Bootstrap complete" > /tmp/bootstrap-done
      Tags:
        - Key: Name
          Value: gbn-proto-creator
        - Key: Role
          Value: creator

  RelayInstance1:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref RelayInstanceType
      ImageId: !Ref AmiId
      IamInstanceProfile: !Ref Phase1InstanceProfile
      SubnetId: !Ref SubnetA
      SecurityGroupIds:
        - !Ref RelaySecurityGroup
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euxo pipefail
          hostnamectl set-hostname gbn-relay-1
          dnf install -y gcc make openssl-devel
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "Bootstrap complete" > /tmp/bootstrap-done
      Tags:
        - Key: Name
          Value: gbn-proto-relay-1
        - Key: Role
          Value: relay

  RelayInstance2:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref RelayInstanceType
      ImageId: !Ref AmiId
      IamInstanceProfile: !Ref Phase1InstanceProfile
      SubnetId: !Ref SubnetB
      SecurityGroupIds:
        - !Ref RelaySecurityGroup
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euxo pipefail
          hostnamectl set-hostname gbn-relay-2
          dnf install -y gcc make openssl-devel
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "Bootstrap complete" > /tmp/bootstrap-done
      Tags:
        - Key: Name
          Value: gbn-proto-relay-2
        - Key: Role
          Value: relay

  RelayInstance3:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref RelayInstanceType
      ImageId: !Ref AmiId
      IamInstanceProfile: !Ref Phase1InstanceProfile
      SubnetId: !Ref SubnetB
      SecurityGroupIds:
        - !Ref RelaySecurityGroup
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euxo pipefail
          hostnamectl set-hostname gbn-relay-3
          dnf install -y gcc make openssl-devel
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "Bootstrap complete" > /tmp/bootstrap-done
      Tags:
        - Key: Name
          Value: gbn-proto-relay-3
        - Key: Role
          Value: relay

  RelayInstance4:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref RelayInstanceType
      ImageId: !Ref AmiId
      IamInstanceProfile: !Ref Phase1InstanceProfile
      SubnetId: !Ref SubnetC
      SecurityGroupIds:
        - !Ref RelaySecurityGroup
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euxo pipefail
          hostnamectl set-hostname gbn-relay-4
          dnf install -y gcc make openssl-devel
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "Bootstrap complete" > /tmp/bootstrap-done
      Tags:
        - Key: Name
          Value: gbn-proto-relay-4
        - Key: Role
          Value: relay

  PublisherInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref PublisherInstanceType
      ImageId: !Ref AmiId
      IamInstanceProfile: !Ref Phase1InstanceProfile
      SubnetId: !Ref SubnetC
      SecurityGroupIds:
        - !Ref RelaySecurityGroup
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euxo pipefail
          hostnamectl set-hostname gbn-publisher
          dnf install -y gcc make openssl-devel
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "Bootstrap complete" > /tmp/bootstrap-done
      Tags:
        - Key: Name
          Value: gbn-proto-publisher
        - Key: Role
          Value: publisher

Outputs:
  ArtifactBucketName:
    Description: Artifact bucket used by SSM deployment scripts
    Value: !Ref ArtifactBucket

  CreatorInstanceId:
    Description: Instance ID of the Creator node
    Value: !Ref CreatorInstance

  PublisherInstanceId:
    Description: Instance ID of the Publisher node
    Value: !Ref PublisherInstance

  Relay1InstanceId:
    Description: Instance ID of Relay 1
    Value: !Ref RelayInstance1

  Relay2InstanceId:
    Description: Instance ID of Relay 2
    Value: !Ref RelayInstance2

  Relay3InstanceId:
    Description: Instance ID of Relay 3
    Value: !Ref RelayInstance3

  Relay4InstanceId:
    Description: Instance ID of Relay 4
    Value: !Ref RelayInstance4

  CreatorPublicIP:
    Description: Public IP of the Creator instance
    Value: !GetAtt CreatorInstance.PublicIp

  Relay1PublicIP:
    Description: Public IP of Relay 1 (Subnet A)
    Value: !GetAtt RelayInstance1.PublicIp

  Relay2PublicIP:
    Description: Public IP of Relay 2 (Subnet B)
    Value: !GetAtt RelayInstance2.PublicIp

  Relay3PublicIP:
    Description: Public IP of Relay 3 (Subnet B)
    Value: !GetAtt RelayInstance3.PublicIp

  Relay4PublicIP:
    Description: Public IP of Relay 4 (Subnet C)
    Value: !GetAtt RelayInstance4.PublicIp

  PublisherPublicIP:
    Description: Public IP of the Publisher instance
    Value: !GetAtt PublisherInstance.PublicIp

  PublisherPrivateIP:
    Description: Private IP of the Publisher instance
    Value: !GetAtt PublisherInstance.PrivateIp

  CloudMapNamespaceId:
    Description: Cloud Map namespace ID for relay discovery
    Value: !Ref CloudMapNamespace

  CloudMapNamespaceName:
    Description: Cloud Map namespace DNS name
    Value: gbn.local

  RelayDiscoveryServiceId:
    Description: Cloud Map service ID for relays
    Value: !Ref RelayDiscoveryService

  EstimatedCost:
    Description: Estimated hourly cost (Spot pricing varies)
    Value: "~$0.024/hr for 7 instances. REMEMBER TO RUN teardown.sh WHEN DONE."
